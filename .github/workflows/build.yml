name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller pillow

      - name: Build launcher
        run: |
          pyinstaller --name LastChaosLauncher --onefile --windowed --icon LC.ico --add-data "background.jpg;." main.py

      - name: Find built exe
        run: |
          Get-ChildItem . -Filter "*.exe" -Recurse -File | Select -Expand FullName

      - name: Create zip archive
        run: |
          Compress-Archive -Path "dist/LastChaosLauncher.exe" -DestinationPath "lastchaos-windows-x64.zip"

      - name: Delete old release
        run: |
          $headers = @{
             "Authorization" = "token ${{ secrets.GITHUB_TOKEN }}"
             "Accept" = "application/vnd.github+json"
           }
          $releases = Invoke-RestMethod -Uri "https://api.github.com/repos/${{ github.repository }}/releases" -Headers $headers
          foreach ($rel in $releases) {
            if ($rel.tag_name -eq "latest") {
              Write-Host "Deleting release: $($rel.id)"
              Invoke-RestMethod -Uri "https://api.github.com/repos/${{ github.repository }}/releases/$($rel.id)" -Headers $headers -Method Delete
            }
          }

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: lastchaos-windows-x64.zip
          tag_name: latest
          name: Latest Build
          generate_release_notes: true
          overwrite: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}