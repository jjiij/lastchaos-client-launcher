name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create launcher package
        run: |
          Compress-Archive -Path "CD_Root/*" -DestinationPath "lastchaos-launcher-windows-x64.zip" -Force
          # Add downloader
          Compress-Archive -Path "main.py" -DestinationPath "lastchaos-launcher-windows-x64.zip" -Update
          Compress-Archive -Path "Update-Game.bat" -DestinationPath "lastchaos-launcher-windows-x64.zip" -Update
          Compress-Archive -Path "Launch-Game.bat" -DestinationPath "lastchaos-launcher-windows-x64.zip" -Update

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: lastchaos-launcher-windows-x64.zip
          tag_name: latest
          name: Latest Build
          body: "LastChaos Launcher with Game Downloader"
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}